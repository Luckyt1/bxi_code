{
    /* 交互参数 */
    "interact": {
        "interact_timeout": "-1",
        "result_timeout": "5000"
    },

    /* 全局设置 */
    "global": {
        "scene": "main_box"
    },

    "login": {
        "appid": "ad184cbf",
        "key":"301e469bbd67f75138209b58436a9e1a",
        "api_secret": "ZDFkY2JkNjIyZDU3NzZjNjhmYmMzZTA5"
    },

    /* 全局设置 */
    // 若要将新版本SDK（6.6.xxxx.xxxx以上）当作老版本（5.6.xxxx.xxxx）使用，请把aiui_ver的值改为1
    // "scene" 场景，示例："main"，"main_box"（带box的为测试环境）。在平台的应用配置页面添加和配置
    // "aiui_ver" AIUI版本，取值："1"（通用语义），"2"（交互大模型），"3"（极速交互，默认）
    // "clean_dialog_history" 清除对话历史方式，取值："auto"（SDK自动控制，默认，按speech中的interact_mode处理：oneshot模式下首次唤醒清历史，continuous模式下每次唤醒都会清历史），"user"（外部控制）
    "global": {
        "scene": "main_box",
        "aiui_ver": "1",
        "clean_dialog_history": "auto"
    },

    /* 业务相关参数 */
    /* 本地vad参数 */
    "vad": {
        "engine_type": "meta"
    },

    /* 识别（音频输入）参数 */
    "iat": {
        "sample_rate": "16000"
    },

    /* 唤醒参数 */
    "ivw": {
        "mic_type": "mic1",
        "res_path": "AIUI/assets/vtn/vtn.ini"
    },

    /* 合成参数 */
    "tts": {
        "engine_type": "cloud",
         "voice_name": "x4_lingxiaoying_em_v2"
    },

    /* 业务流程相关参数 */
    /* 语音业务流程 */
    "speech": {
        "data_source": "sdk",
        "wakeup_mode": "off",
        "interact_mode": "continuous",
        "intent_engine_type": "cloud",
        "audio_captor": "system"
    },


    /* 音频转换参数 */
    "recorder": {
        "sample_size": 2,
        "channel_count": 1,
        "channel_filter": "0,-1"
    },

    // 传给大模型的参数
    "cbmparams": {
        "nlp": {
            "nlp": {
                "encoding": "utf8",
                "compress": "raw",
                "format": "json"
            },
            "sub_scene": "cbm_v45"
        }
    },
    /* 日志设置 */
    "log": {
        "debug_log": "0",
        "save_datalog": "0",
        "datalog_path": "",
        "datalog_size": 1024,
        "raw_audio_path": ""
    }
}
