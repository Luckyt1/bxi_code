### 1. 全局 EKF 节点：融合 Odom 和 GPS，发布 map -> odom ###
ekf_filter_node_map:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_acceleration: false
    publish_tf: true
    
    # 坐标系设置
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map  # 设置为 map，使其发布 map -> odom 的变换
    # [必须禁用] 之前的 LIO 输入
    odom0: ""  # 留空或注释掉
    odom0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0: /imu/rtk
    # imu0_config: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # RTK IMU 只有四元数 (Orientation): 开启 roll, pitch, yaw (idx 3, 4, 5)
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false

    # 输入2: GPS 转换后的里程计 (提供全局绝对位置，修正漂移)
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,  # X, Y (从 GPS 获得绝对位置)
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_queue_size: 10

### 2. NavSat Transform 节点：GPS (经纬度) -> Odom (米) ###
navsat_transform:
  ros__parameters:
    frequency: 10.0
    delay: 3.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_cartesian_transform: false
    publish_filtered_gps: true
    use_odometry_yaw: false
    # wait_for_datum: false
    wait_for_datum: true
    datum: [31.1275603082, 121.2981752719, 0.0]  # [纬度, 经度, 航向角]
    # 允许一定的时间偏差
    transform_timeout: 1.5 
    
    # 明确指定 Frame ID
    base_link_frame: base_link
    gps_frame: gps_link
    odom_frame: odom
    world_frame: map 