# 行为树导航器配置 - 负责协调整个导航过程的行为树执行
bt_navigator:
  ros__parameters:
    use_sim_time: false  # 不使用仿真时间，使用真实系统时间
    global_frame: map    # 全局坐标系为地图坐标系
    robot_base_frame: base_link  # 机器人基座坐标系
    # odom_topic: /fastlio2/lio_odom   # 里程计话题，使用FAST-LIO2的激光里程计
    odom_topic: /odom  # 里程计话题，使用FAST-LIO2的激光里程计
    enable_voxel_based_heuristic: false  # 禁用基于体素的启发式方法
    # 默认导航行为树文件路径，包含重新规划和恢复行为
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    # 注意：plugin_lib_names 参数已被删除

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.25
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    odom_frame: odom
    base_frame: base_link

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      max_vel_x: 0.5
      min_vel_y: 0.0
      max_vel_y: 0.0
      min_vel_theta: -0.8
      max_vel_theta: 0.8
      acc_lim_x: 0.25
      acc_lim_y: 0.0
      acc_lim_theta: 0.35
      decel_lim_x: -0.25
      decel_lim_y: 0.0
      decel_lim_theta: -0.35
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      prune_plan: true
      short_term_abort_threshold: 0.1
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      trans_stopped_velocity: 0.01
      short_term_trajectory_builder_timeout: 0.05
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      GoalAlign.scale: 0.0
      Oscillation.scale: 0.0

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 2.0
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.1
      robot_radius: 0.35
      plugins: ["obstacle_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 3.0
          min_obstacle_height: -3.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      transform_tolerance: 2.0
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.35
      resolution: 0.1
      track_unknown_space: false
      
      # 无地图模式关键配置：
      # 使用 rolling_window 让全局地图跟随机器人，避免走出边界
      rolling_window: true 
      width: 100
      height: 100
      origin_x: -50.0
      origin_y: -50.0
      
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4
      always_send_full_costmap: false

# 规划器服务器配置 - 负责全局路径规划
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0  # 期望规划频率10.0
    use_sim_time: false
    planner_plugins: ["GridBased"]  # 使用基于网格的规划器
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"  # NavFn规划器
      tolerance: 0.25          # 目标容差0.5米0.2
      use_astar: false        # 不使用A*算法，使用Dijkstra
      allow_unknown: false     # 允许在未知区域规划
      transform_tolerance: 1.0  # 坐标变换容忍时间

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["back_up", "wait", "spin"]  
    spin:
      plugin: "nav2_recoveries/Spin"
      max_rotational_vel: 1.0     
      min_rotational_vel: 0.1
      rotational_acc_lim: 0.5
    back_up:
      plugin: "nav2_recoveries/BackUp"
      backup_vel: -0.1            
      backup_duration: 2.0       
    wait:
      plugin: "nav2_recoveries/Wait"
      wait_duration: 5.0          
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0