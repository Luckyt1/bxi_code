### 1. 全局 EKF 节点：融合 Odom 和 GPS，发布 map -> odom ###
ekf_filter_node_map:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_acceleration: false
    publish_tf: true
    
    # 坐标系设置
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map  # 设置为 map，使其发布 map -> odom 的变换

    # [必改] IMU 输入：纯定位模式下 IMU 数据至关重要
    imu0: /livox/imu
    imu0_config: [true,  true,  true,   # [已修复] 必须启用 Orientation，否则系统没航向
                  true,  true,  true,   # Angular Velocity (X,Y,Z)
                  true,  true,  true,   # Linear Acceleration (X,Y,Z)
                  false, false, false,
                  false, false, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

    # 输入2: GPS 转换后的里程计 (提供全局绝对位置，修正漂移)
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,  # X, Y, Z (只信任 GPS 的水平位置)
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_queue_size: 10

### 2. NavSat Transform 节点：GPS (经纬度) -> Odom (米) ###
navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 0.0
    magnetic_declination_radians: 0.0  # 磁偏角，根据所在城市查询并修改 (东偏为正)
    yaw_offset: 0.0                    # IMU 朝向与正东的偏差 (如 IMU 安装不是正北需修改)
    zero_altitude: true                # 忽略 GPS 高度，设为 0（用于平面导航）
    broadcast_cartesian_transform: true # [调试] 强制发布 map->odom 以便观察
    publish_filtered_gps: true
    use_odometry_yaw: false            # 使用输入的里程计/IMU 来获取航向
    wait_for_datum: false               # [确认] 设为 false，自动以第一个定位置为原点

    # 设置地图原点 (必须与你 Python 脚本里的 origin_lat, origin_lon 一致！)
    # 格式: [纬度, 经度, 航向(弧度)]
    # datum: [31.123456, 121.123456, 0.0] 